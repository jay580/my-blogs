<script>
const experiments = [
  {
    id: "exp1",
    num: "Exp 1",
    title: "Keil µVision IDE — Introduction & Setup",
    aim: "Introduce Keil µVision IDE and familiarise students with its use for 8051 microcontroller programming.",
    theory: `<p>Keil µVision is an Integrated Development Environment (IDE) developed by ARM (formerly Keil Elektronik GmbH) specifically for embedded systems development. It brings together a text editor, compiler, assembler, linker, simulator, and debugger in a single interface.</p>
<h4>Why Keil for 8051?</h4>
<p>The 8051 is an 8-bit Harvard architecture microcontroller (program memory separate from data memory) originally by Intel. Keil provides the C51 compiler (for C programs) and A51 assembler (for assembly programs), both optimised for the 8051 instruction set. It also provides a built-in simulator that can emulate ports, timers, UARTs, and interrupts — allowing you to test code without hardware.</p>
<h4>Build Process</h4>
<p>When you write code and click "Build Target", Keil runs the compiler/assembler → linker → locator pipeline. The output is a .HEX file (Intel HEX format) which encodes machine code with address information. This HEX file is what you flash to the actual microcontroller using a programmer (like Flash Magic).</p>
<h4>Key Registers you see in the IDE</h4>
<p>During simulation, the register window shows: Accumulator (A), B register, SP (Stack Pointer), PC (Program Counter), PSW (Program Status Word — carry, auxiliary carry, zero, overflow flags), and the four register banks R0–R7. The memory window shows internal RAM (addresses 00H–FFH) in real time.</p>
<h4>Crystal Frequency</h4>
<p>The standard 8051 uses 12 oscillator cycles per machine cycle. With an 11.0592 MHz crystal, one machine cycle = 1.085 µs — chosen because it produces exact baud rates for serial communication (e.g. 9600 bps).</p>`,
    summary: "Keil µVision is the standard IDE for 8051 development. It compiles C or Assembly source into a HEX file, which is flashed onto hardware. The simulator lets you verify register values and port states before touching real hardware.",
    steps: [
      "Open Keil µVision → Project → New µVision Project → give it a name and save.",
      "Device selection dialog appears → expand Atmel or Generic 8051 folder → select AT89C51 (or AT89S52) → OK.",
      "A dialog asks 'Add STARTUP.A51?' — click No for simple programs.",
      "Right-click 'Source Group 1' in the Project window → Add New Item → select 'Asm File (.s)' or 'C File (.c)' → name it → Add.",
      "Write your code in the editor that opens.",
      "Go to Project → Options for Target → Output tab → tick 'Create HEX File'.",
      "Click 'Build Target' (F7) — check the Build Output window for 0 errors.",
      "To simulate: Debug → Start/Stop Debug Session (Ctrl+F5). Use Run (F5), Step (F11), and watch Registers + Memory windows."
    ],
    code: `; Simple LED blink on P2.0 (basic test program)
ORG 0000H
MAIN:  SETB P2.0        ; Set P2.0 HIGH (LED OFF for common anode)
       ACALL DELAY
       CLR  P2.0        ; Set P2.0 LOW  (LED ON for common anode)
       ACALL DELAY
       SJMP MAIN

DELAY: MOV TMOD, #01H  ; Timer0 Mode1 (16-bit)
       MOV TH0, #3CH   ; Load high byte for 50ms
       MOV TL0, #0B0H  ; Load low byte
       SETB TR0         ; Start Timer0
L1:    JNB TF0, L1      ; Wait for overflow
       CLR TR0          ; Stop timer
       CLR TF0          ; Clear flag
       RET
END`,
    vivas: [
      { q: "What is Keil µVision?", a: "It is an IDE by ARM for embedded development — integrates editor, C51 compiler, A51 assembler, linker, simulator and debugger for 8051 and other ARM-based microcontrollers." },
      { q: "What is a HEX file and why is it needed?", a: "A HEX file (Intel HEX format) is the binary image of the compiled program encoded as ASCII hex records with address info. It's needed because this is the format that in-system programmers (like Flash Magic) use to write code to the 8051's flash memory." },
      { q: "What is the difference between C51 compiler and A51 assembler?", a: "C51 compiles high-level C code to 8051 machine code. A51 assembles 8051 assembly language mnemonics directly to machine code. C is portable and readable; Assembly gives direct hardware control and smaller code." },
      { q: "What is the function of the Program Counter (PC)?", a: "PC holds the address of the next instruction to be fetched and executed. It auto-increments after each fetch. It cannot be directly read or written in 8051 assembly except via LJMP/ACALL instructions." },
      { q: "What does PSW stand for and what bits does it contain?", a: "Program Status Word — an 8-bit SFR containing: CY (Carry), AC (Auxiliary Carry), F0 (user flag), RS1:RS0 (Register Bank select), OV (Overflow), P (Parity)." },
      { q: "Why is 11.0592 MHz used as crystal frequency?", a: "Because with the 8051's 12-cycles-per-machine-cycle architecture, 11.0592 MHz gives a machine cycle of 1.085 µs, which produces exact integer division for standard baud rates like 9600, 4800, 19200 bps in Timer1 Mode 2." },
      { q: "What is the Harvard architecture?", a: "An architecture where program memory (code) and data memory are physically separate with separate buses. The 8051 uses Harvard architecture — ROM/Flash for code, internal RAM for data." }
    ]
  },
  {
    id: "exp2",
    num: "Exp 2 / Lab 02",
    title: "Arithmetic & Logical Operations (ALU)",
    aim: "Write 8051 Assembly programs for ADD, SUB, MUL, DIV and AND, OR, XOR operations on 8-bit numbers stored in memory.",
    theory: `<p>The 8051's Arithmetic and Logic Unit (ALU) performs operations using the Accumulator (A) as the primary operand register. All arithmetic results land in A (with the B register used as the second 8-bit register for MUL and DIV).</p>
<h4>Arithmetic Instructions</h4>
<p><strong>ADD A, src</strong> — Adds src to A. Sets CY if result > FFH. Sets AC if carry from bit 3 to bit 4. Sets OV if signed overflow.</p>
<p><strong>SUBB A, src</strong> — Subtracts src AND borrow (CY) from A. Always subtract with borrow — clear CY first if no borrow intended.</p>
<p><strong>MUL AB</strong> — Multiplies A × B. 16-bit result: high byte → B, low byte → A. Clears CY. Sets OV if result > FFH.</p>
<p><strong>DIV AB</strong> — Divides A by B. Quotient → A, Remainder → B. CY=0 always. OV=1 if B=0 (divide by zero).</p>
<h4>Logical Instructions</h4>
<p><strong>ANL A, src</strong> — Bitwise AND. Used to clear specific bits (mask operation). Example: ANL A, #0FH clears upper nibble.</p>
<p><strong>ORL A, src</strong> — Bitwise OR. Used to set specific bits. Example: ORL A, #80H sets MSB.</p>
<p><strong>XRL A, src</strong> — Bitwise XOR. Used to toggle bits or compare (if A XOR B = 0, they're equal).</p>
<h4>Memory Addressing used here</h4>
<p>The experiment uses direct addressing (MOV A, 40H — reads internal RAM location 40H) and register indirect (via R0 as pointer). Internal RAM 00H–7FH is general-purpose; 80H–FFH is SFR space.</p>`,
    summary: "8051 ALU operations all use the Accumulator. ADD/SUB affect CY and OV flags. MUL gives 16-bit result in B:A. DIV puts quotient in A, remainder in B. Logical ops (AND/OR/XOR) work bit-by-bit and are essential for bit manipulation.",
    steps: [
      "Store operand 1 (e.g. 24H) at memory address 40H and operand 2 (e.g. 09H) at address 41H using the Memory window in Keil debug mode.",
      "Write the assembly program covering all 7 operations (ADD, SUBB, MUL, DIV, ANL, ORL, XRL).",
      "Load each operand: MOV A, 40H (gets first operand), MOV R0, 41H (gets second into R0).",
      "Perform operation and store result (e.g. ADD A, R0 → MOV 42H, A).",
      "Build and simulate. Open Memory window (View → Memory Windows → Memory 1).",
      "Check addresses 42H onward for results — verify manually with binary calculations.",
      "For MUL: result is two bytes — check A (low byte at 47H) and B (high byte at 48H).",
      "For DIV: check A (quotient at 49H) and B (remainder at 4AH)."
    ],
    code: `; Store: 40H = 24H (operand 1), 41H = 09H (operand 2) in memory
       MOV A, 40H      ; Load operand 1 into A
       MOV R0, 41H     ; Load operand 2 into R0

; ADDITION
       ADD A, R0
       MOV 42H, A      ; Result: 2DH

; SUBTRACTION (clear carry first)
       CLR C
       MOV A, 40H
       SUBB A, R0
       MOV 43H, A      ; Result: 1BH

; AND
       MOV A, 40H
       ANL A, R0
       MOV 44H, A      ; Result: 00H

; OR
       MOV A, 40H
       ORL A, R0
       MOV 45H, A      ; Result: 2DH

; XOR
       MOV A, 40H
       XRL A, R0
       MOV 46H, A      ; Result: 2DH

; MULTIPLICATION
       MOV A, 40H
       MOV B, R0
       MUL AB
       MOV 47H, A      ; Low byte: 44H
       MOV 48H, B      ; High byte: 01H

; DIVISION
       MOV A, 40H
       MOV B, R0
       DIV AB
       MOV 49H, A      ; Quotient: 04H
       MOV 4AH, B      ; Remainder: 00H

STOP: SJMP STOP
END`,
    vivas: [
      { q: "Why does 8051 have SUBB instead of SUB?", a: "The 8051 always subtracts with borrow (CY flag). If you want simple subtraction without borrow, you clear the CY flag first using CLR C before executing SUBB. This design simplifies multi-byte subtraction chaining." },
      { q: "What is the result stored in for MUL AB and why two registers?", a: "MUL AB multiplies two 8-bit numbers. The result can be up to 16 bits (e.g. FFH × FFH = FE01H), so it cannot fit in one 8-bit register. Low byte goes to A, high byte goes to B." },
      { q: "What happens if you divide by zero in DIV AB?", a: "The OV (Overflow) flag in PSW is set to 1, indicating a divide-by-zero error. The CY flag is always 0. The result in A and B is undefined." },
      { q: "What is the difference between direct and register indirect addressing?", a: "Direct addressing uses a literal address (MOV A, 40H — fetches from RAM location 40H). Register indirect uses a register as pointer (MOV A, @R0 — fetches from the address stored in R0). Indirect allows looping through arrays." },
      { q: "How would you use ANL to extract only the lower nibble of A?", a: "ANL A, #0FH — this ANDs with 00001111B, which zeroes the upper 4 bits and keeps the lower 4 bits unchanged. Used in BCD and hex-to-ASCII conversions." },
      { q: "What flags does ADD affect?", a: "ADD affects CY (carry out of bit 7), AC (carry out of bit 3, used for BCD), OV (signed overflow — XOR of carry into and out of MSB), and P (parity of A)." },
      { q: "What is the internal RAM map of the 8051?", a: "00H–1FH: four register banks (R0–R7 each). 20H–2FH: bit-addressable area (128 bits). 30H–7FH: general purpose RAM. 80H–FFH: SFR (Special Function Register) space." }
    ]
  },
  {
    id: "exp3",
    num: "Lab 03",
    title: "I/O Port Sampling — Store & Average",
    aim: "Store 5 samples from an external device via Port 1 of the 8051 and compute their average.",
    theory: `<p>The 8051 has four 8-bit parallel I/O ports: P0, P1, P2, P3. Each port has a latch (SFR) and output drivers. Writing 1s to a port latch configures the pins as inputs (quasi-bidirectional mode), reading the port pin captures the external logic level.</p>
<h4>Port 1 as Input</h4>
<p>Writing MOV P1, #0FFH writes all 1s to Port 1 latch, turning on internal pull-ups and making all pins high-impedance inputs. External logic can then pull pins low. When you MOV A, P1, you read the actual pin values, not the latch.</p>
<h4>Data Collection Loop</h4>
<p>The experiment uses a pointer (R0) starting at memory address 40H and a counter (R1 = 05H for 5 samples). The DJNZ (Decrement and Jump if Not Zero) instruction forms a tight loop: read from P1 → store via @R0 → increment pointer → decrement counter → repeat until counter = 0.</p>
<h4>Computing the Average</h4>
<p>After collecting samples, a second loop sums them using ADD A, @R0 starting with A=0. Then DIV AB divides the sum by the count (4H in this code, though logically should be 05H). The quotient (average) is stored at address 45H. This demonstrates both data acquisition and basic DSP-like averaging.</p>
<h4>Why Averaging Matters</h4>
<p>In real embedded systems (sensors, ADCs), individual readings can have noise. Averaging multiple samples gives a smoother, more accurate result — fundamental to signal processing in embedded applications.</p>`,
    summary: "Port 1 is configured as input by writing FFH to it. Data is read sample-by-sample in a loop using DJNZ and stored using indirect addressing (@R0). A second loop sums all samples and DIV AB computes the average. This is the basis of embedded data acquisition.",
    steps: [
      "Configure P1 as input: MOV P1, #0FFH.",
      "Set counter R1 = 05H (5 samples) and pointer R0 = 40H (start of storage area).",
      "Enter sampling loop: MOV A, P1 (read sample), MOV @R0, A (store at R0 pointer), INC R0, DJNZ R1, BACK.",
      "After loop, reinitialise: R1 = 05H, R0 = 40H, A = 00H.",
      "Enter summation loop: ADD A, @R0, INC R0, DJNZ R1, BACK1.",
      "Divide: MOV B, #05H → DIV AB → MOV 45H, A (store average).",
      "In Keil simulation: use the Memory window to manually write test values at 40H–44H to simulate sensor readings.",
      "Run the program and verify the result at address 45H matches the expected average."
    ],
    code: `       MOV P1, #0FFH   ; Configure P1 as input
       MOV R1, #05H    ; Sample count = 5
       MOV R0, #40H    ; Pointer to storage start

; --- SAMPLING LOOP ---
BACK:  MOV A, P1       ; Read sample from Port 1
       MOV @R0, A      ; Store at current pointer address
       INC R0          ; Move to next address
       DJNZ R1, BACK   ; Repeat for all 5 samples

; --- SUMMATION LOOP ---
       MOV R1, #05H    ; Reset counter
       MOV R0, #40H    ; Reset pointer
       MOV A, #00H     ; Clear accumulator

BACK1: ADD A, @R0      ; Add sample to running total
       INC R0
       DJNZ R1, BACK1

; --- COMPUTE AVERAGE ---
       MOV B, #05H     ; Divisor = 5
       DIV AB
       MOV 45H, A      ; Store average at 45H

STOP:  SJMP STOP
END`,
    vivas: [
      { q: "Why do we write FFH to P1 before reading from it?", a: "The 8051 ports are quasi-bidirectional. Writing 1s to the latch enables the internal weak pull-ups and makes the output driver float high-Z, allowing external signals to drive the pin. Without writing 1s, the pin may be driven low by the latch, ignoring external input." },
      { q: "What is DJNZ and how does it work?", a: "Decrement and Jump if Not Zero. DJNZ Rn, label decrements register Rn by 1 and jumps to label if result ≠ 0. If result = 0, execution falls through. It is the standard 8051 loop instruction." },
      { q: "What is the difference between MOV @R0, A and MOV R0, A?", a: "MOV R0, A copies A's value into R0 register. MOV @R0, A uses R0 as a pointer — it writes A's value to the internal RAM address that R0 holds. @R0 means 'at the address in R0'." },
      { q: "Which registers can be used as indirect pointers in 8051?", a: "Only R0 and R1 (from the current register bank) can be used as 8-bit indirect pointers for internal RAM (using @R0, @R1). For external memory (XRAM), DPTR is used with MOVX instruction." },
      { q: "What is the purpose of averaging samples?", a: "Averaging reduces noise — random errors in individual readings cancel out statistically. The more samples averaged, the lower the noise floor. This is essential in ADC-based sensor systems." },
      { q: "What addressing mode is @R0?", a: "Register Indirect addressing. The address of the operand is the contents of R0. It allows runtime-computed addresses, enabling loops that process arrays in memory." },
      { q: "If the sum exceeds 255 (FFH), what happens?", a: "The carry flag (CY) is set and A wraps around (modulo 256). For multi-byte numbers, you'd need to check CY after each ADD and propagate it to a higher byte. This is why multi-byte arithmetic uses ADDC (Add with Carry)." }
    ]
  },
  {
    id: "exp4",
    num: "Lab 04",
    title: "LED Interfacing — Blink, Switch Control & Patterns",
    aim: "Blink an LED at 1-second intervals, control LED via switch input, and generate patterns on 8 common-anode LEDs.",
    theory: `<p>This experiment covers GPIO output driving, delay generation using timers, and digital input reading — the three fundamental hardware I/O skills in embedded systems.</p>
<h4>Common Anode vs Common Cathode</h4>
<p>In a common anode LED configuration, the anode (+) of all LEDs is connected to +5V. To turn ON an LED, the microcontroller pin must output logic-0 (LOW) to sink current. To turn OFF, output logic-1 (HIGH). This is the inverse of common cathode. So CLR P2.0 = LED ON, SETB P2.0 = LED OFF for common anode.</p>
<h4>Timer-Based Delay (50ms × 20 = 1 second)</h4>
<p>Timer 0 in Mode 1 is a 16-bit timer. With 11.0592 MHz crystal, each machine cycle = 1.085 µs. Timer counts from loaded value to FFFFH then overflows (TF0=1). To generate 50ms delay: count needed = 50000µs ÷ 1.085µs ≈ 46082 cycles. 65536 − 46082 = 19454 = 3CB0H, so TH0 = 3CH, TL0 = B0H. Repeating 20 times (R0=14H=20) gives 1 second.</p>
<h4>Switch Debouncing (conceptual)</h4>
<p>Mechanical switches bounce — briefly make and break contact multiple times when pressed. In this experiment, the code uses JB (Jump if Bit set) and JNB (Jump if Bit Not set) on P3.7 to wait for stable high or low state. A proper design adds a hardware capacitor or software delay loop after detecting a transition.</p>
<h4>Bit Rotation for Patterns</h4>
<p>The RL A (Rotate Left through carry) instruction shifts all 8 bits left, with bit 7 going to bit 0. This creates a moving '1' across the 8 LEDs — a "knight rider" effect. XRL and MOV with immediate values create arbitrary patterns.</p>`,
    summary: "Common anode LEDs: LOW = ON, HIGH = OFF. 1-second delay = 20× 50ms timer overflows (TH0=3CH, TL0=B0H). Switch on P3.7: JB waits for pressed (low), JNB waits for released. RL A rotates accumulator left to shift LED patterns.",
    steps: [
      "Connect LED anode to +5V, cathode through 220Ω resistor to P2.0. Set P2.0 as output.",
      "Part A (Blink): Use SETB P2.0 (OFF) → ACALL DELAY → CLR P2.0 (ON) → ACALL DELAY → SJMP MAIN.",
      "Delay subroutine: MOV TMOD, #01H → MOV R0, #14H (20 repeats) → load TH0=3CH, TL0=B0H → SETB TR0 → poll TF0 → CLR TR0 → CLR TF0 → DJNZ R0, L2 → RET.",
      "Part B (Switch control): SETB P3.7 (configure as input). Use JB P3.7, L1 to wait for switch press (P3.7=0). CLR P2.0 → wait for release with JNB P3.7, L2 → SETB P2.0.",
      "Part C (Patterns): Load pattern into A (e.g. #25H), MOV P2, A, call delay, RL A to rotate, repeat with SJMP MAIN.",
      "Simulate in Keil: in debug mode, toggle port pin P3.7 manually in the port window to simulate switch press.",
      "Verify LED state changes in the peripherals/port window during simulation."
    ],
    code: `; ============ PART A: LED BLINK ============
MAIN:  SETB P2.0        ; LED OFF (common anode)
       ACALL DELAY
       CLR  P2.0        ; LED ON
       ACALL DELAY
       SJMP MAIN

DELAY: MOV TMOD, #01H   ; Timer0 Mode1
       MOV R0, #14H     ; 20 repetitions = 1 sec
L2:    MOV TL0, #0B0H   ; 50ms count low byte
       MOV TH0, #3CH    ; 50ms count high byte
       SETB TR0          ; Start timer
L1:    JNB TF0, L1       ; Wait for overflow
       CLR TR0           ; Stop
       CLR TF0           ; Clear flag
       DJNZ R0, L2
       RET

; ============ PART B: SWITCH CONTROL ============
;      SETB P3.7          ; P3.7 as input (switch)
;L3:   SETB P2.0          ; LED OFF initially
;L1:   JB P3.7, L1        ; Wait until switch pressed (P3.7=0)
;      CLR P2.0           ; LED ON
;L2:   JNB P3.7, L2       ; Wait until released
;      SJMP L3

; ============ PART C: LED PATTERNS ============
;MAIN: MOV A, #25H       ; Initial pattern 00100101B
;      MOV P2, A
;      ACALL DELAY
;      RL A               ; Rotate left
;      SJMP MAIN
END`,
    vivas: [
      { q: "Why is P3.7 set to 1 before reading the switch?", a: "For the same quasi-bidirectional port reason as Port 1. Writing 1 to P3.7 enables the pull-up and makes it an input. Without this, the latch drives the pin low and the switch cannot override it." },
      { q: "What is the TMOD register and how is it configured for Timer0 Mode1?", a: "TMOD (Timer Mode register, address 89H) is not bit-addressable. The lower nibble (bits 3:0) configures Timer0, upper nibble for Timer1. MOV TMOD, #01H sets Timer0 to Mode1 (16-bit, no auto-reload) and leaves Timer1 unchanged." },
      { q: "What are TF0 and TR0?", a: "TR0 (Timer Run bit, TCON.4): set to 1 to start Timer0, clear to stop. TF0 (Timer Flag, TCON.5): automatically set to 1 by hardware when Timer0 overflows from FFFFH to 0000H. You must clear it in software after servicing." },
      { q: "What does RL A do?", a: "Rotate Left — shifts all 8 bits of A one position left. Bit 7 goes to bit 0 (rotates into itself, not CY). Used to create moving patterns on LEDs." },
      { q: "What is the difference between RL A and RLC A?", a: "RL A rotates without carry — bit 7 goes directly to bit 0. RLC A rotates through carry — bit 7 goes to CY, and old CY goes to bit 0. RLC is used for multi-byte shift operations." },
      { q: "How is the 1-second delay calculated?", a: "With 11.0592 MHz crystal: machine cycle = 12/11.0592M ≈ 1.085µs. For 50ms: 50000µs ÷ 1.085µs ≈ 46082 counts. Timer preload = 65536−46082 = 19454 = 4C32H... but common approximation uses 3CB0H (≈50ms). 20 × 50ms = 1 second (R0=#14H = 20d)." },
      { q: "What is JNB vs JB instruction?", a: "JB bit, label — Jump if Bit is 1 (set). JNB bit, label — Jump if Bit is 0 (not set). Both are single-bit test-and-branch instructions. P3.7 is a directly bit-addressable SFR bit." }
    ]
  },
  {

    aim: "Interface a 7-segment display with 8051 to count up 0-9, count down 9-0, and toggle direction via switch. Also count 00-99 with two displays.",
    theory: `<p>A 7-segment display (SSD) has 7 LED segments labelled a–g and a decimal point. By turning specific segments on or off, digits 0–9 and some letters can be displayed. The segment encoding is stored in a lookup table (LUT).</p>
<h4>Common Cathode vs Common Anode Codes</h4>
<p>Common Cathode (CC): all cathodes tied to GND. Logic 1 turns a segment ON. Segment code for '0' = 00111111B = 3FH (segments a,b,c,d,e,f on).<br>
Common Anode (CA): all anodes tied to +5V. Logic 0 turns a segment ON. CA code = bitwise NOT of CC code. For '0': CA = C0H.</p>
<h4>Lookup Table (LUT) with MOVC</h4>
<p>The segment codes are stored in program memory as DB (Define Byte) directives after a label. MOVC A, @A+DPTR loads a byte from code memory at address DPTR+A. This is ideal for tables — set DPTR to table base address and use index in A to fetch the right code. The instruction MOVC cannot access data memory (RAM), only code memory (ROM/Flash).</p>
<h4>CC Lookup Table</h4>
<p>SEG_TAB: DB 3FH,06H,5BH,4FH,66H,6DH,7DH,07H,7FH,6FH maps digits 0–9.</p>
<h4>CJNE — Compare and Jump</h4>
<p>CJNE R0, #0AH, MAIN compares R0 with 10 (0AH). If they're not equal, it jumps to MAIN. When R0 reaches 10 (after counting 0–9), CJNE falls through and R0 is reset to 0. This is how the 0–9 loop is managed without IF statements.</p>`,
    summary: "7-segment codes are stored in a ROM lookup table and fetched using MOVC A, @A+DPTR. CJNE creates the 0-9 counter loop. Switch on P3.3 changes counting direction. Two SSDs can be multiplexed or driven simultaneously through one port (split nibbles).",
    steps: [
      "Connect SSD segments a-g to P1.0–P1.6. For common cathode: GND to common pin. For common anode: +5V to common pin.",

      "Main loop: MOVC A, @A+DPTR (A=R0 here) → MOV P1, A → ACALL DELAY → INC R0 → CJNE R0, #0AH, MAIN → reset R0=0 → SJMP MAIN.",
      "Part B (0-9 up + 9-0 down): Extended table with 19 entries (0,1..9,8..1,0) and CJNE check against #13H (19).",
      "Part C (Switch direction): Use JB P3.3, DOWN_COUNT to decide direction. In UP: INC R0, CJNE R0,#0AH. In DOWN: DEC R0, CJNE R0,#0FFH (wrap below 0).",

START: MOV DPTR, #SEG_TAB  ; Base address of table
       MOV R0, #00H         ; Start index

MAIN:  MOV A, R0
       MOVC A, @A+DPTR      ; Fetch segment code
       MOV P1, A            ; Output to display
       ACALL DELAY
       INC R0
       CJNE R0, #0AH, MAIN  ; Loop until R0=10
       MOV R0, #00H         ; Reset index
       SJMP MAIN

DELAY: MOV TMOD, #01H
       MOV R1, #14H
L2:    MOV TL0, #0B0H
       MOV TH0, #3CH
       SETB TR0
L1:    JNB TF0, L1
       CLR TR0
       CLR TF0
       DJNZ R1, L2
       RET

; Common Cathode segment codes 0-9
SEG_TAB: DB 3FH,06H,5BH,4FH,66H,6DH,7DH,07H,7FH,6FH

; ====== PART C: SWITCH-CONTROLLED DIRECTION ======
; JB P3.3, DOWN_COUNT   ; if P3.3=1, count down

    vivas: [
      { q: "What is MOVC and how is it different from MOV?", a: "MOVC (Move Code) reads from program memory (code/flash). MOV reads from or writes to data memory (internal/external RAM) or SFRs. MOVC A, @A+DPTR is the standard way to look up values in a constant table stored in ROM." },
      { q: "What is the segment code for digit 7 in common cathode?", a: "07H = 00000111B — only segments a, b, c are on (top bar, upper right, lower right), which draws a '7'." },
      { q: "What is CJNE and what flags does it affect?", a: "Compare and Jump if Not Equal. CJNE A/Rn/indirect, #data/direct, label. Sets CY if the first operand is less than the second (useful for less-than comparisons). Does NOT affect zero or OV flags. Execution jumps to label if operands are unequal." },
      { q: "Why does DEC R0 result in 0FFH when R0=0?", a: "R0 is 8-bit. Decrementing 0 causes unsigned wrap-around: 0 − 1 = 255 = FFH in 8-bit. CJNE R0, #0FFH, MAIN detects this wrap and resets R0 to 09H, effectively clamping the down-counter." },
      { q: "How would you display on a common anode display?", a: "Invert all segment codes. If CC code for '0' is 3FH = 00111111B, then CA code = 11000000B = C0H. You can either store CA codes in the table, or use CPL A (complement accumulator) after fetching the CC code." },
      { q: "What is multiplexing in multi-digit displays?", a: "Rapidly switching between digits — displaying one digit at a time but switching fast enough (>50Hz) that persistence of vision makes all digits appear on simultaneously. Reduces I/O pins needed from 7×N to 7+N pins." },
      { q: "What is DPTR and how big is it?", a: "Data Pointer — a 16-bit register made of DPH (high byte) and DPL (low byte). Used for accessing external memory (MOVX) and code memory (MOVC). It can address up to 64KB (0000H–FFFFH)." }

  {
    id: "exp6",

    theory: `<p>The 16×2 LCD (based on HD44780 controller) has 16 characters per row, 2 rows. It communicates in parallel — either 8-bit mode (uses D0–D7 + 3 control pins) or 4-bit mode (uses D4–D7 only).</p>
<h4>Control Pins</h4>
<p><strong>RS (Register Select)</strong>: RS=0 → Command Register (send LCD commands). RS=1 → Data Register (send character ASCII).</p>
<p><strong>R/W (Read/Write)</strong>: R/W=0 → Write to LCD. R/W=1 → Read from LCD. Almost always R/W=0 in practice.</p>
<p><strong>E (Enable)</strong>: Data is latched on the falling edge of E (HIGH→LOW transition). Must pulse E high then low for each byte sent.</p>
<h4>Initialization Sequence (8-bit mode)</h4>
<p>1. Send 38H — Function Set: 2 lines, 5×7 dot matrix, 8-bit interface.<br>
2. Send 0EH — Display ON, cursor ON (0CH=cursor off, 0FH=blinking cursor).<br>

4. Send 06H — Entry Mode: increment cursor, no display shift.</p>
<h4>Sending Characters</h4>
<p>To display 'V' (ASCII 56H): set RS=1 (data mode), R/W=0, load 56H to data port, pulse E. The DDRAM (Display Data RAM) of the LCD stores characters. Line 1 starts at address 00H (set with command 80H), line 2 at 40H (command C0H).</p>
<h4>Why a Delay After Each Command?</h4>
<p>The HD44780 needs time to execute commands (1.52ms for clear, 37µs for most others). Without delay, the next command overwrites before execution completes, causing garbled display.</p>`,
    summary: "LCD has 3 control pins: RS (command/data), RW (read/write), E (enable pulse). Commands sent with RS=0, data (characters) with RS=1. Initialization: 38H, 0EH, 01H, 06H. Each byte sent by pulsing E high→low. ASCII value of character is sent to display it.",

      "Initialize LCD: send commands 38H (2-line), 0EH (display on), 01H (clear), 06H (increment) using the COMMAND subroutine.",

      "Send character 'V': MOV A, #'V' → ACALL DISPLAY. Repeat for 'I' and 'T'.",

    code: `       ORG 0000H
       ORG 0040H
       SJMP MAIN

MAIN:  MOV SP, #60H        ; Set stack pointer

; --- LCD INITIALIZATION ---

       CLR P2.6             ; RW=0 (write)

    vivas: [

      { q: "Why is a falling edge needed on the Enable pin?", a: "The HD44780 LCD controller is edge-triggered on Enable. It samples the data and RS/RW lines on the HIGH-to-LOW (falling) transition of E. You must first set E high, then clear it — this pulse causes the LCD to latch the data." },
      { q: "What does command 38H mean?", a: "38H = 00111000B. In HD44780 command format: DL=1 (8-bit interface), N=1 (2 lines), F=0 (5×7 font). It initialises the LCD for 8-bit, 2-line, 5×7 dot matrix mode." },
      { q: "How do you position the cursor to line 2?", a: "Send command C0H (10000000B | 40H). The upper bit (1) is the 'Set DDRAM Address' command flag, and 40H is the DDRAM start address of line 2. For line 1: send 80H (= 10000000B | 00H)." },
      { q: "What is DDRAM in the LCD?", a: "Display Data RAM — 80 bytes of RAM inside the HD44780 that stores the ASCII codes of characters being displayed. Line 1 maps to addresses 00H–27H, Line 2 to 40H–67H. Writing an ASCII code to the current cursor DDRAM address displays that character." },

    theory: `<p>UART (Universal Asynchronous Receiver/Transmitter) allows serial communication — data sent one bit at a time on a single wire. The 8051's built-in UART uses the TXD (P3.1) and RXD (P3.0) pins.</p>
<h4>Baud Rate Generation with Timer1 Mode2</h4>
<p>Timer1 in Mode 2 (8-bit auto-reload) is the standard way to generate baud rate. The timer auto-reloads TH1 into TL1 on overflow, giving a precise, continuous clock for the UART. For 9600 baud with 11.0592 MHz crystal: TH1 = 0FDH = 253. Timer1 overflows every 3 machine cycles → 11.0592M ÷ 12 ÷ (256−253) = 307,200 Hz ÷ 32 = 9600 baud.</p>
<h4>SCON Register (Serial Control)</h4>
<p>MOV SCON, #50H = 01010000B:<br>
SM0=0, SM1=1 → Mode 1 (8-bit UART, variable baud)<br>
SM2=0 → multiprocessor mode off<br>
REN=1 → Receiver Enabled<br>
TB8, RB8, TI, RI = 0</p>
<h4>Transmitting</h4>
<p>Load SBUF with the byte to send. Hardware automatically generates start bit, 8 data bits, stop bit. TI (Transmit Interrupt flag) is set when transmission completes. You must poll JNB TI, WAIT and then CLR TI before sending next byte.</p>
<h4>Receiving</h4>
<p>RI (Receive Interrupt flag) is set by hardware when a complete byte is received in SBUF. Poll JNB RI, REPEAT. Read SBUF → CLR RI. The same SBUF address is used for both TX and RX (separate hardware registers).</p>`,
    summary: "UART on 8051 uses Timer1 Mode2 as baud rate generator (TH1=FDH for 9600). SCON=50H enables Mode1 UART with receiver. TX: write to SBUF, poll TI, clear TI. RX: poll RI, read SBUF, clear RI. Two 8051s connect TXD(P3.1) → RXD(P3.0) with common ground.",
    steps: [
      "Hardware: Connect Transmitter P3.1 (TXD) to Receiver P3.0 (RXD). Common GND. LCD data port to Receiver P2, RS→P3.2, RW→P3.3, EN→P3.4.",
      "Transmitter code: MOV TMOD, #20H (Timer1 Mode2) → MOV TH1, #0FDH → MOV SCON, #50H → SETB TR1.",
      "Load string pointer: MOV DPTR, #STRING. Loop: MOVC A, @A+DPTR → JZ STOP (null terminator check) → MOV SBUF, A → poll JNB TI, WAIT → CLR TI → INC DPTR → repeat.",
      "Receiver code: Same UART init (TMOD, TH1, SCON, TR1). Then ACALL LCD_INIT.",
      "Receive loop: JNB RI, REPEAT (wait for data) → MOV A, SBUF → ACALL LCD_DATA → CLR RI → SJMP REPEAT.",
      "LCD subroutines on receiver: LCD_INIT sends 38H, 0EH, 01H, 06H. LCD_CMD sets RS=0, LCD_DATA sets RS=1, both pulse EN.",

    code: `; ======= TRANSMITTER CODE =======
       MOV TMOD, #20H     ; Timer1 Mode2 (auto-reload)
       MOV TH1, #0FDH     ; 9600 baud @ 11.0592MHz
       MOV SCON, #50H     ; Mode1, REN=1
       SETB TR1            ; Start Timer1

       MOV DPTR, #STRING
NEXT:  CLR A
       MOVC A, @A+DPTR    ; Get char from table
       JZ STOP             ; Null terminator = done
       MOV SBUF, A         ; Send character
WAIT:  JNB TI, WAIT        ; Wait for TX complete
       CLR TI              ; Clear TX flag
       INC DPTR
       SJMP NEXT
STOP:  SJMP STOP

STRING: DB 'VIT', 00H     ; Null-terminated string
END

; ======= RECEIVER CODE =======
;      MOV TMOD, #20H
;      MOV TH1, #0FDH
;      MOV SCON, #50H
;      SETB TR1
;      ACALL LCD_INIT
;      MOV A, #80H         ; Cursor line1
;      ACALL LCD_CMD
;REPEAT: JNB RI, REPEAT    ; Wait for byte
;      MOV A, SBUF
;      ACALL LCD_DATA       ; Display on LCD
;      CLR RI
;      SJMP REPEAT
; (LCD subroutines same as Exp 6 with P2=data, P3.2=RS, P3.3=RW, P3.4=EN)`,
    vivas: [
      { q: "What does SCON = 50H configure?", a: "50H = 01010000B. Bits: SM0=0, SM1=1 → UART Mode 1 (8-bit, variable baud). SM2=0, REN=1 (receiver enabled). TI=RI=0. This is the standard full-duplex UART configuration." },
      { q: "Why is Timer1 used in Mode 2 for baud rate?", a: "Mode 2 is 8-bit auto-reload. TH1 holds the reload value and is automatically copied to TL1 on each overflow. This gives a continuous, fixed-frequency clock without software intervention — essential for generating a stable baud rate." },
      { q: "Calculate: how is TH1 = FDH derived for 9600 baud?", a: "Formula: TH1 = 256 − (Crystal ÷ (12 × 32 × BaudRate)) = 256 − (11059200 ÷ (12 × 32 × 9600)) = 256 − (11059200 ÷ 3686400) = 256 − 3 = 253 = FDH." },
      { q: "What is TI and when is it set?", a: "TI (Transmit Interrupt flag, SCON.1). Set automatically by hardware when the last bit of the stop bit is transmitted — indicating SBUF is free for the next byte. Must be cleared by software (CLR TI) before sending the next byte." },
      { q: "What is RI and when is it set?", a: "RI (Receive Interrupt flag, SCON.0). Set by hardware when a complete byte (including stop bit) is received and stored in SBUF. Signals the CPU that new data is ready. Must be cleared by software after reading SBUF." },
      { q: "What are the four UART modes of the 8051?", a: "Mode 0: Shift register (fixed baud = fosc/12). Mode 1: 8-bit UART variable baud (most common). Mode 2: 9-bit UART fixed baud (fosc/64 or /32). Mode 3: 9-bit UART variable baud. Mode 1 is the standard for RS-232-style communication." },
      { q: "What connection is needed between two 8051 boards for serial communication?", a: "TXD (P3.1) of transmitter → RXD (P3.0) of receiver. Common GND between both boards. Both must use the same baud rate, same UART mode, and same crystal (or carefully matched crystals). No handshaking lines needed for this basic setup." },

    ]
  }
];

function renderNav() {
  const nav = document.getElementById('expNav');
  experiments.forEach((exp, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.textContent = exp.num;
    btn.onclick = () => {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.exp-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + i).classList.add('active');
    };
    nav.appendChild(btn);
  });
}

function renderPanels() {
  const container = document.getElementById('expContent');
  experiments.forEach((exp, i) => {
    const panel = document.createElement('div');
    panel.className = 'exp-panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + i;

    panel.innerHTML = `
      <div class="exp-header">
        <div class="exp-title">${exp.title} <span class="badge badge-exp">${exp.num}</span></div>
        <div class="exp-aim">${exp.aim}</div>
      </div>
      <div class="section-tabs">
        <button class="tab-btn active" onclick="showTab(this,'theory-${i}','panel-${i}')">Theory</button>
        <button class="tab-btn" onclick="showTab(this,'summary-${i}','panel-${i}')">Summary</button>
        <button class="tab-btn" onclick="showTab(this,'steps-${i}','panel-${i}')">Steps</button>
        <button class="tab-btn" onclick="showTab(this,'code-${i}','panel-${i}')">Code</button>
        <button class="tab-btn" onclick="showTab(this,'viva-${i}','panel-${i}')">Viva Q&amp;A</button>
      </div>
      <div class="tab-content active" id="theory-${i}">
        <div class="theory-block">${exp.theory}</div>
      </div>
      <div class="tab-content" id="summary-${i}">
        <div class="summary-box">${exp.summary}</div>
      </div>
      <div class="tab-content" id="steps-${i}">
        <ol class="step-list">${exp.steps.map(s => `<li><span class="step-num"></span><span>${s}</span></li>`).join('')}</ol>
      </div>
      <div class="tab-content" id="code-${i}">
        <div class="code-block">${exp.code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>
      <div class="tab-content" id="viva-${i}">
        <ul class="viva-list">${exp.vivas.map((v,j) => `
          <li class="viva-q">
            <span class="viva-icon">Q</span>
            <div class="viva-q-wrap">
              <div class="viva-q-text" onclick="toggleAns('ans-${i}-${j}')">${v.q}</div>
              <div class="viva-ans" id="ans-${i}-${j}">${v.a}</div>
            </div>
          </li>`).join('')}
        </ul>
        <div style="font-size:12px;color:var(--color-text-secondary);margin-top:12px;">Tap any question to reveal the answer.</div>
      </div>
    `;
    container.appendChild(panel);
    panel.querySelectorAll('.step-num').forEach((el,idx) => { el.textContent = idx+1; });
  });
}

function showTab(btn, tabId, panelId) {
  const panel = document.getElementById(panelId);
  panel.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  panel.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

function toggleAns(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

renderNav();
renderPanels();
</script>
